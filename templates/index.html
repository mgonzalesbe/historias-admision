<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Historias Clínicas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6366f1 100%);
            min-height: 100vh;
        }
        .landing-card {
            border: none;
            border-radius: 24px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            animation: landingSlideIn 0.6s ease-out;
        }
        @keyframes landingSlideIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .landing-icon {
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .landing-icon-admin {
            background: linear-gradient(135deg, #eef2ff 0%, #e0e7ff 100%);
            color: #4f46e5;
        }
        .landing-icon-admission {
            background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
            color: #059669;
        }
        .role-card {
            border: 1.5px solid #e5e7eb;
            border-radius: 18px;
            padding: 2rem 1.5rem;
            text-align: center;
            transition: all 0.25s ease;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .role-card:hover {
            border-color: #a5b4fc;
            box-shadow: 0 12px 30px rgba(99, 102, 241, 0.12);
            transform: translateY(-4px);
        }
        .role-card h5 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.35rem;
        }
        .brand-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }
        .brand-header i {
            font-size: 1.6rem;
            color: #6366f1;
        }
        .brand-header h3 {
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.02em;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-8 col-lg-7">
                <div class="landing-card p-4 p-md-5">
                    <div class="text-center mb-4">
                        <div class="brand-header">
                            <i class="bi bi-heart-pulse"></i>
                            <h3>Control de Historias Clínicas</h3>
                        </div>
                        <p class="text-muted mb-0">Seleccione el tipo de acceso para continuar</p>
                    </div>
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="role-card">
                                <div class="landing-icon landing-icon-admin">
                                    <i class="bi bi-shield-lock"></i>
                                </div>
                                <h5>Administrador</h5>
                                <p class="text-muted small mb-3">Acceso completo al sistema</p>
                                <a href="{{ url_for('auth.login_admin') }}" class="btn btn-dark w-100">
                                    <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
                                </a>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="role-card">
                                <div class="landing-icon landing-icon-admission">
                                    <i class="bi bi-clipboard-plus"></i>
                                </div>
                                <h5>Personal de Admisión</h5>
                                <p class="text-muted small mb-3">Registro de historias clínicas</p>
                                <a href="{{ url_for('auth.login_admission') }}" class="btn btn-primary w-100">
                                    <i class="bi bi-box-arrow-in-right me-1"></i> Ingresar
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
