<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Error" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6366f1 100%);
            min-height: 100vh;
        }
        .error-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            animation: errorSlideIn 0.5s ease-out;
        }
        @keyframes errorSlideIn {
            from { opacity: 0; transform: translateY(20px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .error-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef2f2 0%, #fee2e2 100%);
            color: #ef4444;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6 col-lg-5">
                <div class="error-card text-center p-5">
                    <div class="error-icon mx-auto">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h3 class="fw-bold mb-2">{{ title or "Error" }}</h3>
                    <p class="text-muted mb-4">{{ message or "Ocurri\u00f3 un error inesperado." }}</p>
                    <a href="{{ url_for('index') }}" class="btn btn-primary px-4">
                        <i class="bi bi-house me-1"></i> Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
