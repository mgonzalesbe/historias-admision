<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlace Inválido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #6366f1 100%);
            min-height: 100vh;
        }
        .token-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25);
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(20px);
            animation: authCardSlideIn 0.5s ease-out;
        }
        .warning-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
            color: #f59e0b;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="token-card text-center p-5">
                    <div class="warning-icon mx-auto">
                        <i class="bi bi-exclamation-triangle"></i>
                    </div>
                    <h4 class="fw-bold mb-2">Enlace Inválido o Expirado</h4>
                    <p class="text-muted mb-4">{{ message if message else 'Este enlace ya no es válido. Solicite uno nuevo a su administrador.' }}</p>
                    <a href="{{ url_for('auth.login_admission') }}" class="btn btn-primary px-4">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Ir al Login
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/navigation-guard.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
